# fly.toml app configuration file generated for portfolio-monitor-ai on 2026-04-13T17:12:57+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'portfolio-monitor-ai'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile"
  context = ".."


[env]
  PORT = '8080'

[[mounts]]
  source = 'portfolio_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
