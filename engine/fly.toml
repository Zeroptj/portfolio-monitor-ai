app = "portfolio-monitor-ai"
primary_region = "sin"   # Singapore — ใกล้ Bangkok ที่สุด

[build]

[env]
  PORT = "8080"

# Persistent volume สำหรับ SQLite database
[[mounts]]
  source      = "portfolio_data"
  destination = "/data"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"   # หยุดเมื่อไม่มี request → ประหยัด free hours
  auto_start_machines  = true     # wake up อัตโนมัติเมื่อมี request (cold start ~5-10s)
  min_machines_running = 0

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
